name: Lighthouse CI

# Lighthouse is MANUAL-ONLY (`workflow_dispatch`). It previously ran on every
# push to main + every PR, but the multi-shard matrix × 3 runs is the heaviest
# workflow here and the scores are stable enough that auto-running on every
# commit wasn't worth the runner minutes. Trigger it from the Actions tab
# ("Run workflow") when you want a fresh audit — e.g. after a perf-sensitive
# change or a dependency bump. Re-add `push:` / `pull_request:` to the trigger
# list to put it back on autopilot.
on:
  workflow_dispatch:

# Cancel any in-flight Lighthouse run on the same ref when a new commit lands.
# Lighthouse only tells us about the current build's quality, so an audit of an
# obsolete commit is pure waste — burns CI minutes and clutters the artifact
# list. Auto-cancel keeps only the latest run alive. Grouping by `github.ref`
# means each PR / branch / main gets its own cancellation lane (a push to main
# doesn't kill an unrelated PR's Lighthouse run).
#
# Note: only Lighthouse auto-cancels. The deploy workflow (`deploy.yml`) uses
# `cancel-in-progress: false` because Sveltia CMS writes through git and we
# need EVERY deploy to complete in order, never canceled mid-flight.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

# `contents: read` covers every job's checkout of the source. `issues: write`
# is required ONLY by the `summarize` job (which find-or-creates the
# `lighthouse-results` tracking issue and PATCHes its body) — kept scoped to
# that job below so the build + matrix shards run with read-only tokens.
# Workflow-level `issues: write` is what zizmor's `excessive-permissions`
# audit flags when the write-scope isn't actually needed by every job.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Strip analytics from the build so Lighthouse measures the site itself,
  # not the 3rd-party perf hit from googletagmanager.com / google-analytics.com
  # (which we can't control: extra main-thread work + async fetches + a script
  # transfer we don't host). With this flag, hooks.server.ts emits empty
  # `%analytics_head%` / `%analytics_body%` blocks for the Lighthouse build —
  # production deploys still inject GTM/GA4 normally. Reproduces the trepa
  # site's pattern. Without it, our Lighthouse scores carry a 5-10 perf
  # point penalty from analytics that's identical across every page.
  DISABLE_ANALYTICS: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    # Hard cap. Build job runs check/lint/format + copyright + lighthouse:config
    # regen + build + artifact upload; ~4-5 min typical. 10 min covers slow runners.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl
      - run: npm ci
      - run: npm run check
      - run: npm run lint
      - run: npm run format:check
      - run: npm run copyright
      - run: npm run lighthouse:config
      - run: npm run build

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist

  lighthouse:
    needs: build
    runs-on: ubuntu-latest
    # Hard cap. Each shard runs Lighthouse against 6-9 URLs with
    # `numberOfRuns: 2`, ~6-9 min per-shard wall-clock. 10-min ceiling is
    # tight — if shards start tripping this, bump to 15 here. The cap stops
    # a hung Chromium audit from sitting indefinitely (Lighthouse occasionally
    # hangs on assertion failures with no exit code).
    timeout-minutes: 10
    strategy:
      # `fail-fast: false` so a regression in one shard doesn't cancel the others
      # — we want to see ALL failing shards on a single PR review, not just the
      # first to fail.
      fail-fast: false
      matrix:
        # 2 langs × 3 content types = 6 parallel shards. Each shard audits a
        # smaller URL list (6-9 URLs vs 23 in the old single-config-per-lang
        # setup), so per-shard wall-clock drops from ~15-25 min to ~6-9 min and
        # the total audit completes faster despite being more thorough.
        lang: [en, es]
        type: [core, writing]
    name: Lighthouse (${{ matrix.type }}-${{ matrix.lang }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Run Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          configPath: ./lighthouse/${{ matrix.type }}-${{ matrix.lang }}.json
          uploadArtifacts: true
          artifactName: lighthouse-results-${{ matrix.type }}-${{ matrix.lang }}
          temporaryPublicStorage: true

      # Persist the per-shard `URL → report URL` map for the summarize job to
      # aggregate. `lhci.outputs.links` is a JSON string; we drop it into a
      # file and upload as a small artifact (~1 KB per shard). `if: always()`
      # so a failed assertion in one shard still produces the partial-link
      # set — the summary should reflect WHAT WAS AUDITED, not just runs that
      # passed every threshold.
      - name: Persist per-shard result links
        if: always() && steps.lhci.outputs.links != ''
        env:
          # Pipe the lhci action's JSON output through an env var instead of
          # interpolating `${{ ... }}` directly into the bash body. zizmor's
          # `template-injection` audit flags inline expansion because GH
          # Actions splices the value into the script before bash sees it —
          # an attacker-controllable output could inject shell metachars.
          # Reading from `$LHCI_LINKS` (double-quoted) keeps the value as
          # data, not code.
          LHCI_LINKS: ${{ steps.lhci.outputs.links }}
        run: |
          mkdir -p shard-links
          printf '%s' "$LHCI_LINKS" > shard-links/links.json

      - name: Upload per-shard links artifact
        if: always() && steps.lhci.outputs.links != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lh-links-${{ matrix.type }}-${{ matrix.lang }}
          path: shard-links/links.json
          retention-days: 7

  # Single-issue results dashboard. After all 6 shards complete (pass or
  # fail), aggregates the per-shard `links.json` artifacts into one markdown
  # body and PATCHes a tracking issue labeled `lighthouse-results`. NEVER
  # creates a comment, NEVER opens a new issue per run — body is overwritten
  # in place every time so the issue is always a live snapshot of the latest
  # main-branch audit.
  #
  # Runs on every manual dispatch (the workflow's only trigger now), so a
  # hand-kicked audit still refreshes the dashboard issue. The
  # `workflow_dispatch` guard is belt-and-braces: if `push:` is ever re-added
  # to the trigger list, summarize keeps gating on the manual path rather than
  # firing for PR branches and polluting the main-branch dashboard.
  #
  # `if: always()` runs even when some shards failed — partial dashboards
  # are MORE useful than no dashboard when something is broken.
  summarize:
    needs: lighthouse
    if: always() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # The github-script step PATCHes the `lighthouse-results` tracking
    # issue (and create-once on first run) — this is the only job in the
    # workflow that needs `issues: write`. `contents: read` covers the
    # checkout of `src/data/configuracion/es/sitio.json` for timezone/url.
    permissions:
      contents: read
      issues: write
    steps:
      # Source checkout is needed because the github-script below reads
      # `src/data/configuracion/es/sitio.json` for the timezone, URL, and
      # short-label fields. Without this step the file isn't on disk
      # (the summarize job otherwise only downloads link artifacts).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download all per-shard link artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: lh-links-*
          path: ./artifacts

      - name: Aggregate + PATCH tracking issue body
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const LABEL = 'lighthouse-results';
            const TITLE = 'Lighthouse — latest run results';

            // Pull site identity from sitio.json instead of hardcoding here.
            // Reading the default-lang slice (es) since `url` / `timezone` /
            // `timezoneLabel` are all `i18n: duplicate` — identical across
            // locales. A fork on a different domain / timezone updates one
            // place (CMS or JSON) and this dashboard reflects it on the
            // next run with zero workflow edits.
            const sitio = JSON.parse(fs.readFileSync('src/data/configuracion/es/sitio.json', 'utf8'));
            const SITE_PREFIX = sitio.url || '';
            const TIMEZONE = sitio.timezone || 'UTC';
            const TZ_LABEL = sitio.timezoneLabel || 'UTC';

            // Aggregate per-shard links
            const shards = [];
            const artifactsDir = './artifacts';
            if (fs.existsSync(artifactsDir)) {
              for (const dir of fs.readdirSync(artifactsDir).sort()) {
                if (!dir.startsWith('lh-links-')) continue;
                // dir name: lh-links-<type>-<lang>
                const parts = dir.split('-');
                const lang = parts[parts.length - 1];
                const type = parts.slice(2, -1).join('-');
                const linksPath = path.join(artifactsDir, dir, 'links.json');
                if (!fs.existsSync(linksPath)) continue;
                const raw = fs.readFileSync(linksPath, 'utf8').trim();
                if (!raw) continue;
                let links;
                try { links = JSON.parse(raw); } catch { links = {}; }
                shards.push({ type, lang, links });
              }
            }

            // Body
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const shortSha = context.sha.slice(0, 7);
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha}`;
            const branch = context.ref.replace('refs/heads/', '');
            // Render the timestamp in the site's local timezone (from
            // sitio.json#timezone — defaults to America/Bogota for arenalucia)
            // since a dashboard glanced at on a phone shouldn't require mental
            // UTC arithmetic. The IANA tz id is the source of truth; the
            // short label (#timezoneLabel) is display-only.
            const now = new Date();
            const parts = new Intl.DateTimeFormat('en-CA', {
              timeZone: TIMEZONE,
              year: 'numeric', month: '2-digit', day: '2-digit',
              hour: '2-digit', minute: '2-digit', hour12: false,
            }).formatToParts(now).reduce((acc, p) => {
              if (p.type !== 'literal') acc[p.type] = p.value;
              return acc;
            }, {});
            const timestamp = `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute} ${TZ_LABEL}`;

            let body = `## Lighthouse — latest run results\n\n`;
            body += `> **Branch**: \`${branch}\` · `;
            body += `**Commit**: [\`${shortSha}\`](${commitUrl}) · `;
            body += `**Run**: [#${context.runNumber}](${runUrl}) · `;
            body += `**Timestamp**: ${timestamp}\n\n`;

            if (shards.length === 0) {
              body += `_⚠️ No shards produced result links — every shard may have failed before upload. Check the [run logs](${runUrl})._\n\n`;
            } else {
              const total = shards.reduce((acc, s) => acc + Object.keys(s.links).length, 0);
              body += `**${shards.length} shard(s) · ${total} URL(s) audited**\n\n`;
              for (const { type, lang, links } of shards) {
                const urls = Object.entries(links);
                body += `<details><summary><b>${type} / ${lang}</b> — ${urls.length} URL${urls.length === 1 ? '' : 's'}</summary>\n\n`;
                body += `| URL | Report |\n|---|---|\n`;
                for (const [url, reportUrl] of urls) {
                  const shortUrl = url.replace(SITE_PREFIX, '') || '/';
                  body += `| \`${shortUrl}\` | [open report](${reportUrl}) |\n`;
                }
                body += `\n</details>\n\n`;
              }
            }

            body += `---\n\n`;
            body += `_Body auto-updated by [\`.github/workflows/lighthouse.yml\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/main/.github/workflows/lighthouse.yml) on every push to \`main\`. Do not edit manually — your changes will be overwritten on the next run._\n\n`;
            body += `_Reports hosted at Lighthouse temporary public storage (~7 day retention). If a link 404s, re-run the workflow to regenerate._\n`;

            // Ensure label exists (idempotent — 404 means create)
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: LABEL });
            } catch (err) {
              if (err.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: LABEL,
                  color: '5319e7',
                  description: 'Auto-maintained Lighthouse results dashboard (one issue, body rewritten per run)',
                });
                core.info(`Created label '${LABEL}'`);
              } else {
                throw err;
              }
            }

            // Find existing tracking issue by label (state: all so we can re-open a closed one)
            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: LABEL,
              state: 'all',
              per_page: 10,
            });

            if (issues.length === 0) {
              const { data: created } = await github.rest.issues.create({
                ...context.repo,
                title: TITLE,
                body,
                labels: [LABEL],
              });
              core.info(`Created tracking issue #${created.number}: ${created.html_url}`);
              core.notice(`Lighthouse dashboard created: ${created.html_url}`);
            } else {
              // Update the most recent issue (sorted by created date desc by default)
              const issue = issues[0];
              if (issue.state === 'closed') {
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: issue.number,
                  state: 'open',
                });
                core.info(`Re-opened tracking issue #${issue.number}`);
              }
              await github.rest.issues.update({
                ...context.repo,
                issue_number: issue.number,
                body,
              });
              core.info(`Updated tracking issue #${issue.number}: ${issue.html_url}`);
              core.notice(`Lighthouse dashboard updated: ${issue.html_url}`);
            }
