      # -----------------------------------------------------------------------
      # ARCHIVOS DE ESTRUCTURA DEL TEMPLATE (NO USADOS EN APU)
      # -----------------------------------------------------------------------
      # APU es de una sola página y no tiene blog (escritos), portafolio ni
      # proyectos. Estos archivos existen solo porque el template los exige;
      # se mantienen con valores por defecto y NO se muestran en el sitio.

      # --- Escritos (no usado) ---
      - name: escritos
        label: "Escritos (no usado)"
        file: src/data/configuracion/{{locale}}/escritos.json
        i18n: true
        fields:
          - { name: writingPageId, label: Identificador de la página de Escritos, widget: string, required: false, i18n: duplicate, default: "escritos" }
          - { name: writingPageSize, label: Posts por página, widget: number, required: false, i18n: duplicate, value_type: int, default: 10, min: 1 }
          - name: feedSectionLabel
            label: Etiqueta de sección para feeds RSS/Atom
            widget: string
            required: false
            i18n: true
            pattern: ["^[\\s\\S]{0,60}$", "Máximo 60 caracteres"]
          - { name: defaultSort, label: Orden por defecto, widget: select, required: false, i18n: duplicate, default: "date-desc", options: ["date-desc", "date-asc", "updated-desc"] }
          - { name: feedItemCount, label: Items máximos en feeds, widget: number, required: false, i18n: duplicate, value_type: int, default: 50, min: 1, max: 500 }
          - { name: showSummary, label: Mostrar resumen, widget: boolean, required: false, i18n: duplicate, default: true }
          - { name: showFilters, label: Mostrar filtros por tipo, widget: boolean, required: false, i18n: duplicate, default: true }
          - { name: cardsPerRow, label: Tarjetas por fila, widget: number, required: false, i18n: duplicate, value_type: int, default: 3, min: 1, max: 6 }

      # --- Portafolio (no usado) ---
      - name: portafolio
        label: "Portafolio (no usado)"
        file: src/data/configuracion/{{locale}}/portafolio.json
        i18n: true
        fields:
          - { name: portfolioPageId, label: Identificador de la página de Portafolio, widget: string, required: false, i18n: duplicate, default: "portafolio" }
          - { name: defaultSort, label: Orden por defecto de los álbumes, widget: select, required: false, i18n: duplicate, default: "manual", options: ["manual", "name-asc", "name-desc"] }
          - name: defaultFilter
            label: Filtro inicial del portafolio
            widget: string
            required: false
            i18n: duplicate
            default: "all"
            pattern: ["^[a-z][a-z0-9-]*$|^all$", "Use 'all' o un tag válido (minúsculas, números, guiones)"]

      # --- Proyectos (no usado) ---
      - name: proyectos
        label: "Proyectos (no usado)"
        file: src/data/configuracion/{{locale}}/proyectos.json
        i18n: true
        fields:
          - { name: cardsPerRow, label: Tarjetas por fila (Proyectos), widget: number, required: false, i18n: duplicate, value_type: int, default: 3, min: 1, max: 6 }
